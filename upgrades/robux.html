        :root {
            --rbx-safe-top: env(safe-area-inset-top, 0px);
        }

        html {
            box-sizing: border-box;
        }

        /* Always apply safe-area to the fixed Roblox header so time/wifi/battery never overlap. */

        .rbx-header,
        #header,
        .navbar-fixed-top {
            padding-top: var(--rbx-safe-top) !important;
            box-sizing: content-box;
        }

        /* Push side-nav and content below the bigger header. */

        .rbx-left-col,
        .left-nav {
            margin-top: var(--rbx-safe-top);
        }

        /* NOTE: .container-main keeps its native margin-top (74/82px). The balance row
     (data-section-type=PAYMENTS_PRODUCT_SECTION_TYPE_TRANSFERS) already adds
     its own margin-top: env(safe-area-inset-top) via inline React style, so we
     must NOT add safe-area to .container-main here — that would double-count
     and create a visible gap between the header bottom and the balance row. */

        /* Restore the 16px right gap on the balance/Send pill at medium+ widths.
     The native class "medium:margin-right-[16px]" may not resolve in our
     resource-saver CSS capture, so make it explicit. Higher-specificity
     selector + force position:static so React inline styles cannot pull the
     pill back inside the fixed header at ultra-wide viewports. */

        @media (min-width: 768px) {
            div[data-section-type="PAYMENTS_PRODUCT_SECTION_TYPE_TRANSFERS"],
            [data-section-type="PAYMENTS_PRODUCT_SECTION_TYPE_TRANSFERS"] {
                position: static !important;
                top: auto !important;
                right: auto !important;
                align-self: flex-end !important;
                margin-top: 16px !important;
                margin-right: 16px !important;
                margin-left: auto !important;
            }
        }

            [data-section-type="PAYMENTS_PRODUCT_SECTION_TYPE_TRANSFERS"] {
                margin-right: 24px !important;
            }
        }

        body {
            padding-bottom: env(safe-area-inset-bottom, 0px);

            display: none !important;
        }

        /* When launched from the home screen, force a comfortable status-bar gap

        @media (display-mode: standalone),

    <script type="text/javascript">
        $(function() {
            function trackReturns() {
                function dayDiff(d1, d2) {
                    return Math.floor((d1 - d2) / 86400000);
                }
                if (!localStorage) {
                    return false;
                }

                var cookieName = 'RBXReturn';
                var cookieOptions = {
                    expires: 9001
                };
                var cookieStr = localStorage.getItem(cookieName) || "";
                var cookie = {};

                try {
                    cookie = JSON.parse(cookieStr);
                } catch (ex) {
                    // busted cookie string from old previous version of the code
                }

                try {
                    if (typeof cookie.ts === "undefined" || isNaN(new Date(cookie.ts))) {
                        localStorage.setItem(cookieName, JSON.stringify({
                            ts: new Date().toDateString()
                        }));
                        return false;
                    }
                } catch (ex) {
                    return false;
                }

                var daysSinceFirstVisit = dayDiff(new Date(), new Date(cookie.ts));
                if (daysSinceFirstVisit == 1 && typeof cookie.odr === "undefined") {
                    RobloxEventManager.triggerEvent('rbx_evt_odr', {});
                    cookie.odr = 1;
                }
                if (daysSinceFirstVisit >= 1 && daysSinceFirstVisit <= 7 && typeof cookie.sdr === "undefined") {
                    RobloxEventManager.triggerEvent('rbx_evt_sdr', {});
                    cookie.sdr = 1;
                }
                try {
                    localStorage.setItem(cookieName, JSON.stringify(cookie));
                } catch (ex) {
                    return false;
                }
            }

            GoogleListener.init();



            RobloxEventManager.initialize(true);
            RobloxEventManager.triggerEvent('rbx_evt_pageview');
            trackReturns();


            RobloxEventManager._idleInterval = 450000;
            RobloxEventManager.registerCookieStoreEvent('rbx_evt_initial_install_start');
            RobloxEventManager.registerCookieStoreEvent('rbx_evt_ftp');
            RobloxEventManager.registerCookieStoreEvent('rbx_evt_initial_install_success');
            RobloxEventManager.registerCookieStoreEvent('rbx_evt_fmp');

        });
    </script>
